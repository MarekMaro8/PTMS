name: PTMS CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobieramy Backend (aktualne repo) do folderu 'ptms-backend'
      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          path: ptms-backend

      # 2. Pobieramy Frontend - teraz używamy Twojego klucza prywatnego
      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: MarekMaro8/PTMS-frontend
          path: ptms-frontend
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ptms-backend/gradlew

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ptms-backend/Dockerfile
          push: true
          # Tutaj używamy Twojego loginu z Docker Hub
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ptms-backend:latest