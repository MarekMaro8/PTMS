name: PTMS CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobieramy Backend do folderu 'ptms-backend'
      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          path: ptms-backend

      # 2. Pobieramy Frontend do folderu 'ptms-frontend'
      # Używamy Twojego tokena PAT z uprawnieniami 'repo'
      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: MarekMaro8/PTMS-frontend
          path: ptms-frontend
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      # 3. Diagnostyka (Opcjonalnie - żebyś widział w logach, że pliki tam są)
      - name: Verify folders structure
        run: ls -R

      # 4. Konfiguracja Javy
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 5. Naprawa uprawnień do pliku gradlew (na maszynie Linux)
      - name: Grant execute permission for gradlew
        run: chmod +x ptms-backend/gradlew

      # 6. Logowanie do Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. Budowanie i wysyłka
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          # Context to folder, w którym leżą "ptms-backend" i "ptms-frontend"
          context: .
          # Wskazujemy, gdzie fizycznie leży Dockerfile
          file: ./ptms-backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ptms-backend:latest