name: PTMS CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobieramy pliki projektu bezpośrednio do głównego katalogu
      - name: Checkout Backend
        uses: actions/checkout@v4
        # USUNĘLIŚMY 'path: ptms-backend' - teraz pliki są na "wierzchu"


      # 2. Pobieramy Frontend (zostawiamy w osobnym folderze, żeby nie śmiecił)
      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: MarekMaro8/PTMS-frontend
          path: ptms-frontend
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      # 3. Logowanie do Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Budowanie i wysyłka
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          # Context to '.', czyli główny folder, bo tam teraz są pliki src i Dockerfile
          context: .
          # Dockerfile jest teraz na wierzchu
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ptms-backend:latest