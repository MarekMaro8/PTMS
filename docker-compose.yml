version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: ptms_db_dev
    environment:
      POSTGRES_DB: ptms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD} # Pobiera z Twojego lokalnego .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mapujemy Twój lokalny plik z kodem:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  backend:
    build: . # KLUCZOWE: Buduje z Twojego aktualnego kodu w IntelliJ
    container_name: ptms_backend_dev
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/ptms_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}

volumes:
  postgres_data: